# Serves the VMS SPA. API/auth/tRPC/websocket paths are routed to the API container by Caddy
# upstream, so they never reach nginx — this only serves static assets and the SPA fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Client-side routing: unknown paths fall back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
